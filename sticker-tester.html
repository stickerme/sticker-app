<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sticker.me — API Tester</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F7F6F3;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  header p {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
  }

  .health {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 99px;
    background: #eee;
    color: #888;
    margin-top: 10px;
    cursor: default;
  }
  .health.up { background: #E6F4EC; color: #2A7A50; }
  .health.down { background: #FDECEA; color: #B71C1C; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .card {
    background: #fff;
    border: 1px solid #E8E6E1;
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .card h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #aaa;
    margin-bottom: 1rem;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .full { grid-column: 1 / -1; }

  label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
    font-weight: 500;
  }

  input, select, textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #E0DDD8;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #FAFAF9;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: #9B8EF0;
    background: #fff;
  }
  textarea { min-height: 70px; resize: vertical; font-size: 12px; font-family: 'SF Mono', monospace; }

  .btn-row { display: flex; gap: 10px; margin-top: 1rem; align-items: center; }

  button {
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary { background: #5B4EE8; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #4A3DD6; }
  .btn-secondary { background: #F0EEF9; color: #5B4EE8; border: 1px solid #D6D0F5; }
  .btn-secondary:hover:not(:disabled) { background: #E4E0F5; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 99px;
  }
  .badge-idle { background: #F0EEE8; color: #888; }
  .badge-sending { background: #FEF3C7; color: #92400E; }
  .badge-ok { background: #E6F4EC; color: #2A7A50; }
  .badge-error { background: #FDECEA; color: #B71C1C; }
  .badge-generated { background: #E6F4EC; color: #2A7A50; }
  .badge-failed { background: #FDECEA; color: #B71C1C; }
  .badge-processing { background: #EEF2FF; color: #4338CA; }

  .mono {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    background: #F7F6F3;
    border: 1px solid #E8E6E1;
    border-radius: 8px;
    padding: 1rem;
    white-space: pre-wrap;
    word-break: break-all;
    color: #444;
    min-height: 80px;
    margin-top: 10px;
    line-height: 1.6;
  }

  .resp-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .poll-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 10px 0;
  }

  .poll-info {
    font-size: 12px;
    color: #888;
  }

  .sticker-result {
    margin-top: 1rem;
    text-align: center;
  }

  .sticker-result img {
    max-width: 200px;
    border-radius: 10px;
    border: 1px solid #E8E6E1;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .sticker-result p {
    font-size: 12px;
    color: #888;
    margin-top: 8px;
  }

  .sticker-result a {
    font-size: 12px;
    color: #5B4EE8;
    text-decoration: none;
  }

  .divider { border: none; border-top: 1px solid #F0EEE8; margin: 1rem 0; }

  .order-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
  .order-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #bbb; padding: 4px 8px 8px 0; }
  .order-table td { padding: 6px 8px 6px 0; border-top: 1px solid #F0EEE8; vertical-align: top; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Sticker.me — API Tester</h1>
    <p>Test the Railway /generate endpoint and poll Supabase for results.</p>
    <div class="health" id="healthBadge">
      <span class="dot"></span> Checking server...
    </div>
  </header>

  <div class="card">
    <h2>Request payload</h2>
    <div class="grid2">
      <div>
        <label>Order ID</label>
        <input type="text" id="orderId" value="TEST-001" />
      </div>
      <div>
        <label>Style</label>
        <select id="style">
          <option>Ghibli</option>
          <option>Anime</option>
          <option>Funny</option>
          <option>Elegant</option>
          <option>Cute</option>
          <option>Premium Portrait</option>
        </select>
      </div>
      <div>
        <label>Customer name</label>
        <input type="text" id="customerName" value="Test Guest" />
      </div>
      <div>
        <label>Event ID</label>
        <input type="text" id="eventId" value="hueywedding" />
      </div>
      <div class="full">
        <label>Guest photo URL</label>
        <input type="text" id="photoUrl" value="https://images.pexels.com/photos/1239291/pexels-photo-1239291.jpeg" />
      </div>
      <div class="full">
        <label>Bride/groom photo URL (optional — weddings only)</label>
        <input type="text" id="brideGroomUrl" value="" placeholder="Leave blank to skip" />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" id="sendBtn" onclick="sendTest()">Send test request</button>
    </div>
  </div>

  <div class="card">
    <div class="resp-header">
      <h2 style="margin:0">Response</h2>
      <span class="badge badge-idle" id="statusBadge">Idle</span>
    </div>
    <div class="mono" id="responseBox">Waiting to send...</div>
  </div>

  <div class="card">
    <h2>Poll for result</h2>
    <p style="font-size:13px; color:#888;">Checks Supabase every 10 seconds until the sticker is ready (~60–90s).</p>
    <div class="poll-row">
      <button class="btn-secondary" id="pollBtn" onclick="togglePolling()" disabled>Start polling</button>
      <span class="poll-info" id="pollStatus"></span>
    </div>
    <div class="mono" id="pollBox">Not started</div>
    <div class="sticker-result" id="stickerResult"></div>
  </div>

</div>

<script>
const RAILWAY_URL = 'https://sticker-api-production-0310.up.railway.app';
const SUPABASE_URL = 'https://oaghbtvdlouwhwjvrdct.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hZ2hidHZkbG91d2h3anZyZGN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NTM3MzUsImV4cCI6MjA5NzIyOTczNX0.nKBEsBb6rfa_1TPhl5mCXcxNcH_c_gM5aCsgeIyv_ZM';

let pollInterval = null;
let isPolling = false;
let currentOrderId = null;

const styleMap = {
  'Ghibli': 'soft Studio Ghibli hand-painted style, warm and magical, expressive eyes, cozy storybook energy',
  'Anime': 'clean anime style, bold cel shading, expressive eyes, dynamic energy, collectible illustration feel',
  'Funny': 'funny exaggerated caricature style, big expressions, meme-worthy reactions, joyful and playful',
  'Elegant': 'elegant illustrated style, refined linework, tasteful palette, upscale souvenir feel',
  'Cute': 'cute chibi style, round shapes, big eyes, pastel colors, adorable and charming',
  'Premium Portrait': 'premium portrait illustration, polished and stylish, clean lines, gift-worthy quality'
};

function buildPrompt(style) {
  const base = "Premium die-cut sticker sheet for a 3.6 x 6.6 inch printable area on 4 x 7 inch sticker paper. White background only. Each sticker must be a separate die-cut object with its own clean white border. HARD RULE: no sticker may touch, overlap, or merge with any other sticker. Leave clear visible empty white space between every sticker. Limit to about 5-7 person stickers total. Bold silhouettes, thick clean outlines, high contrast, premium vinyl aesthetic.";
  const styleText = styleMap[style] || 'charming illustrated style, warm and expressive, collectible souvenir energy';
  const eventText = "Guest is main subject. Include wedding element stickers (rings, flowers, champagne, cake, etc.).";
  return `${base} Style: ${styleText}. ${eventText}`;
}

function setBadge(id, text, cls) {
  const b = document.getElementById(id);
  b.textContent = text;
  b.className = 'badge badge-' + cls;
}

async function checkHealth() {
  try {
    const res = await fetch(RAILWAY_URL + '/');
    const data = await res.json();
    const el = document.getElementById('healthBadge');
    if (data.status === 'ok') {
      el.className = 'health up';
      el.innerHTML = '<span class="dot"></span> Server is up · ' + RAILWAY_URL;
    } else {
      el.className = 'health down';
      el.innerHTML = '<span class="dot"></span> Unexpected response';
    }
  } catch(e) {
    const el = document.getElementById('healthBadge');
    el.className = 'health down';
    el.innerHTML = '<span class="dot"></span> Server unreachable';
  }
}

async function sendTest() {
  const orderId = document.getElementById('orderId').value.trim();
  const style = document.getElementById('style').value;
  const customerName = document.getElementById('customerName').value.trim();
  const eventId = document.getElementById('eventId').value.trim();
  const photoUrl = document.getElementById('photoUrl').value.trim();
  const brideGroomImageUrl = document.getElementById('brideGroomUrl').value.trim();

  currentOrderId = orderId;

  const payload = {
    orderId,
    photoUrl,
    prompt: buildPrompt(style),
    brideGroomImageUrl,
    customerName,
    eventId,
    eventName: 'Huey + Wil Wedding',
    eventType: 'wedding',
    style,
    packageVal: 'Included - Event Sticker Pack'
  };

  setBadge('statusBadge', 'Sending...', 'sending');
  document.getElementById('responseBox').textContent = 'POST ' + RAILWAY_URL + '/generate\n\n' + JSON.stringify(payload, null, 2);
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('stickerResult').innerHTML = '';

  try {
    const res = await fetch(RAILWAY_URL + '/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    setBadge('statusBadge', 'HTTP ' + res.status, res.ok ? 'ok' : 'error');
    document.getElementById('responseBox').textContent = 'HTTP ' + res.status + '\n\n' + JSON.stringify(data, null, 2);
    if (res.ok) {
      document.getElementById('pollBtn').disabled = false;
      document.getElementById('pollStatus').textContent = 'Ready — sticker generates in ~60–90s';
    }
  } catch(err) {
    setBadge('statusBadge', 'Network error', 'error');
    document.getElementById('responseBox').textContent = 'Network error:\n' + err.message + '\n\nMake sure the server has CORS headers enabled.';
  }
  document.getElementById('sendBtn').disabled = false;
}

async function pollSupabase() {
  const orderId = currentOrderId;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?order_id=eq.${encodeURIComponent(orderId)}&select=order_id,status,print_status,generated_image_url,error_notes,updated_at`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    const data = await res.json();
    document.getElementById('pollStatus').textContent = 'Last checked: ' + new Date().toLocaleTimeString();

    if (!data || data.length === 0) {
      document.getElementById('pollBox').textContent = 'No row found yet for order_id: ' + orderId + '\n\nThis is normal — the server may still be creating the row.';
      return;
    }

    const row = data[0];
    document.getElementById('pollBox').textContent = JSON.stringify(row, null, 2);

    if (row.status === 'GENERATED' && row.generated_image_url) {
      stopPolling();
      setBadge('statusBadge', 'Generated!', 'generated');
      document.getElementById('stickerResult').innerHTML = `
        <img src="${row.generated_image_url}" alt="Generated sticker" />
        <p>Sticker generated successfully</p>
        <a href="${row.generated_image_url}" target="_blank">Open full size ↗</a>
      `;
    } else if (row.status === 'FAILED') {
      stopPolling();
      setBadge('statusBadge', 'Failed', 'failed');
    } else if (row.status === 'PROCESSING') {
      setBadge('statusBadge', 'Processing...', 'processing');
    }
  } catch(err) {
    document.getElementById('pollBox').textContent = 'Poll error:\n' + err.message;
  }
}

function togglePolling() {
  if (isPolling) {
    stopPolling();
  } else {
    startPolling();
  }
}

function startPolling() {
  isPolling = true;
  document.getElementById('pollBtn').textContent = 'Stop polling';
  pollInterval = setInterval(pollSupabase, 10000);
  pollSupabase();
}

function stopPolling() {
  isPolling = false;
  clearInterval(pollInterval);
  document.getElementById('pollBtn').textContent = 'Start polling';
}

checkHealth();
</script>
</body>
</html>
